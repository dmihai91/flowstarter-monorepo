version: '3.8'

services:
  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flowstarter-library-mcp
    image: flowstarter-library:latest
    env_file:
      - mcp-server/.env
    environment:
      - NODE_ENV=production
    ports:
      - "3001:3001"
    restart: unless-stopped
