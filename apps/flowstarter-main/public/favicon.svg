<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A855F7"/>
      <stop offset="50%" style="stop-color:#8B5CF6"/>
      <stop offset="100%" style="stop-color:#3B82F6"/>
    </linearGradient>
  </defs>
  
  <!-- Background rounded square -->
  <rect x="15" y="15" width="170" height="170" rx="42" fill="url(#logoGrad)"/>
  
  <!-- Abstract flow symbol - rising energy -->
  <g transform="translate(100, 100)">
    <!-- Central rising flow -->
    <path d="M0 45 Q-25 20, 0 -10 Q25 -40, 0 -55" stroke="white" stroke-width="18" stroke-linecap="round" fill="none"/>
    
    <!-- Left accent flow -->
    <path d="M-30 35 Q-40 10, -25 -15" stroke="white" stroke-width="10" stroke-linecap="round" fill="none" opacity="0.6"/>
    
    <!-- Right accent flow -->
    <path d="M30 35 Q40 10, 25 -15" stroke="white" stroke-width="10" stroke-linecap="round" fill="none" opacity="0.6"/>
  </g>
</svg>
