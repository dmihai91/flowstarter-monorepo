<svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGrad" x1="0" y1="40" x2="40" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8B5CF6" />
      <stop offset="1" stop-color="#06B6D4" />
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.5)" />
      <stop offset="50%" stop-color="rgba(255,255,255,1)" />
      <stop offset="100%" stop-color="rgba(255,255,255,0.5)" />
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="40" height="40" rx="10" fill="url(#logoGrad)" />

  <!-- Wave 1 -->
  <path
    d="M8 26 Q14 20, 20 23 Q26 26, 32 20"
    stroke="url(#lineGrad)"
    stroke-width="2.5"
    stroke-linecap="round"
    fill="none"
  />

  <!-- Wave 2 -->
  <path
    d="M8 20 Q14 14, 20 17 Q26 20, 32 14"
    stroke="url(#lineGrad)"
    stroke-width="2.5"
    stroke-linecap="round"
    fill="none"
    opacity="0.55"
  />
</svg>
