<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark background -->
  <rect width="64" height="64" rx="16" fill="#1A1B2E"/>
  
  <!-- Subtle glow -->
  <circle cx="32" cy="32" r="24" fill="url(#glow)" opacity="0.12"/>
  
  <!-- Geometric flow chevron -->
  <path d="M 18 38 L 26 30 L 32 26 L 38 24 L 46 22" 
        stroke="url(#primary)" 
        stroke-width="2.5" 
        stroke-linecap="round" 
        stroke-linejoin="round"
        fill="none"/>
  
  <path d="M 18 32 L 28 24 L 36 20 L 46 18" 
        stroke="url(#secondary)" 
        stroke-width="3" 
        stroke-linecap="round" 
        stroke-linejoin="round"
        fill="none"/>
  
  <path d="M 18 44 L 24 38 L 30 34 L 38 30 L 44 28" 
        stroke="url(#tertiary)" 
        stroke-width="2" 
        stroke-linecap="round" 
        stroke-linejoin="round"
        fill="none"
        opacity="0.85"/>
  
  <!-- Refined endpoint accent with subtle animation -->
  <circle cx="46" cy="18" r="2" fill="url(#accent)" opacity="0.95">
    <animate attributeName="opacity" values="0.8;1;0.8" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="46" cy="18" r="4" stroke="url(#accent)" stroke-width="0.5" fill="none" opacity="0.4">
    <animate attributeName="opacity" values="0.3;0.5;0.3" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <defs>
    <linearGradient id="primary" x1="18" y1="38" x2="46" y2="22" gradientUnits="userSpaceOnUse">
      <stop stop-color="#9ca3af" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#d1d5db" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="secondary" x1="18" y1="32" x2="46" y2="18" gradientUnits="userSpaceOnUse">
      <stop stop-color="#9ca3af" stop-opacity="0.7"/>
      <stop offset="0.5" stop-color="#d1d5db" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#e5e7eb"/>
    </linearGradient>
    <linearGradient id="tertiary" x1="18" y1="44" x2="44" y2="28" gradientUnits="userSpaceOnUse">
      <stop stop-color="#9ca3af" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#d1d5db" stop-opacity="0.8"/>
    </linearGradient>
    <radialGradient id="accent" cx="0.5" cy="0.5" r="0.5">
      <stop stop-color="#e5e7eb"/>
      <stop offset="1" stop-color="#d1d5db"/>
    </radialGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(32 32) scale(24)">
      <stop stop-color="#9ca3af" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#6b7280" stop-opacity="0"/>
    </radialGradient>
  </defs>
</svg>
