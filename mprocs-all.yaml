shell: "pwsh -Command"

procs:
  "📝 Editor":
    shell: "pnpm dev:editor"
    autostart: true
  "📚 Library":
    shell: "pnpm dev:library"
    autostart: true
  "⚡ Convex":
    shell: "pnpm --filter flowstarter-editor convex:dev"
    autostart: true
  "🏠 Main":
    shell: "pnpm dev:main"
    autostart: true
  "🗄️ Supabase":
    shell: "pnpm dev:supabase"
    autostart: true
